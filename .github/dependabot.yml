version: 2
updates:
    # Application & dev dependencies.
    - package-ecosystem: npm
      directory: "/"
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      groups:
          # Batch low-risk updates into one PR to cut noise.
          minor-and-patch:
              update-types:
                  - minor
                  - patch

    # Keeps the SHA-pinned GitHub Actions in .github/workflows up to date.
    - package-ecosystem: github-actions
      directory: "/"
      schedule:
          interval: weekly
